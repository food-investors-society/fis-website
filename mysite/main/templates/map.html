{% extends 'base.html' %}
{% load static %}

{% block add %}
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!--Leaflet Map JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
{% endblock %}

{% block header %}
    My Food Community
{% endblock %}

{% block content %}
    <!-- Map Search Bar -->
    <input id="search" type="text" placeholder="Please enter your postcode...">
    <ul id="result">
    </ul>
    <div id="map"></div>
    <!-- Adding map search function -->
    <script> const bdata = {{ bdata|safe}}</script>
    <script src="{% static 'mapfunction.js' %}"></script>
{% endblock %}
