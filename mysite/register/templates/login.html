{% extends 'base.html' %}
{% load static %}
{% block add %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

{% block header %}
    Login
{% endblock %}
{% load crispy_forms_tags %}
{% block content %}
    <form method="POST" class="form-group" id="form">
	    {% csrf_token %}
	    {{ form|crispy }}
	    <button type="submit" class="btn btn-success">Login</button>
        <input type="hidden" name="next" value="{% url 'map' %}"/>
    </form>
    <div class="border-top pt-3">
        <small class="text-muted">
            Don't Have An Account? <a class="ml-2" href="/sign-up/">Sign Up</a>
            Forgot Your Password? <a class="ml-2" href="/password-reset/">Reset Password</a>
        </small>
    </div>
{% endblock %}
